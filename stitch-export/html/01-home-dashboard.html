<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Rama Aai - Home Dashboard</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ee5b2b",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221510",
                    },
                    fontFamily: {
                        "display": ["Be Vietnam Pro"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>

            background: linear-gradient(135deg, #fdfcfb 0%, #fef1ed 100%);

        .neumorphic-card {
            background: #f8f6f6;
            box-shadow: 8px 8px 16px #e0dede, -8px -8px 16px #ffffff;
        }
        .neumorphic-inset {
            background: #f8f6f6;
            box-shadow: inset 4px 4px 8px #e0dede, inset -4px -4px 8px #ffffff;
        }
        .floating-star {
            position: absolute;
            color: #ee5b2b;
            opacity: 0.2;
        }
    </style>

<div class="neumorphic-card p-2 rounded-full">
