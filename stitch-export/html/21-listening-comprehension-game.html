<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>RAMA AAI - Listening Game</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ee5b2b",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221510",
                    },
                    fontFamily: {
                        "display": ["Be Vietnam Pro"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased overflow-x-hidden">
<div class="relative flex h-screen w-full flex-col">
<!-- Top Navigation Bar -->
<header class="flex items-center justify-between px-6 py-4 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-primary/10 sticky top-0 z-50">
<div class="flex items-center gap-3">
<div class="size-10 bg-primary/10 rounded-xl flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-3xl">auto_stories</span>
</div>
<h1 class="text-xl font-bold tracking-tight text-slate-900 dark:text-slate-100 uppercase">Rama Aai</h1>
</div>
<div class="flex items-center gap-3">
<div class="flex items-center gap-2 bg-primary/10 px-4 py-2 rounded-full border border-primary/20">
<span class="material-symbols-outlined text-primary fill-1">star</span>
<span class="font-bold text-primary">12</span>
</div>
<button class="size-10 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center">
<span class="material-symbols-outlined">settings</span>
</button>
</div>
</header>
<main class="flex-1 flex flex-col items-center max-w-2xl mx-auto w-full px-6 py-6 overflow-y-auto">
<!-- Instruction -->
<div class="text-center mb-8">
<span class="inline-block px-4 py-1 rounded-full bg-primary/5 text-primary text-sm font-semibold mb-2">LESSON 4: ANIMALS</span>
<h2 class="text-2xl font-bold text-slate-800 dark:text-slate-200">Listen and choose the correct picture.</h2>
</div>
<!-- Character Interaction Area -->
<div class="relative flex flex-col items-center gap-6 mb-10 w-full">
<!-- Speech Bubble -->
<div class="relative bg-white dark:bg-slate-800 p-6 rounded-3xl shadow-xl shadow-primary/5 border-2 border-primary/10 max-w-xs animate-bounce-slow">
<p class="text-xl font-bold text-primary text-center">"Find the elephant."</p>
<div class="absolute -bottom-3 left-1/2 -translate-x-1/2 w-6 h-6 bg-white dark:bg-slate-800 border-r-2 border-b-2 border-primary/10 rotate-45"></div>
</div>
<!-- Rama Aai Character -->
<div class="relative">
<div class="size-32 rounded-full bg-primary/20 border-4 border-white dark:border-slate-700 shadow-lg overflow-hidden flex items-center justify-center">
<img alt="Friendly illustrated character Rama Aai" class="w-full h-full object-cover" data-alt="Friendly cartoon woman smiling in storybook style" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAdZBuwuSdj5twl_zVtpyy6EvJI526IlEJZzWTUw6GvfD841_vHWrnue8ajaDGC6qor9mPqahh-ISSfVhKXBp2GJ2O0VvNFASxgE59_kKcYtsUsPh0CtSqZjGqsuVTv2hcTFAnNXGK7SCwjnPekGw5-ik1_iCPfLBm7WtjEC21rxm0WpEFPRhm6mVnmP9gf39jeLoi-2holQpcdscEgTRLkCymTdq7fqKhd83AeOGmaGBdgcV4scIjlhh8g7L5oK9uMdbTf4t7G3IU"/>
</div>
<button class="absolute -right-2 -bottom-2 size-12 bg-primary text-white rounded-full shadow-lg flex items-center justify-center ring-4 ring-white dark:ring-background-dark">
<span class="material-symbols-outlined">volume_up</span>
</button>
</div>
</div>
<!-- 2x2 Game Grid -->
<div class="grid grid-cols-2 gap-4 w-full">
<!-- Option 1: Elephant (Correct) -->
<button class="group relative aspect-square bg-white dark:bg-slate-800 rounded-3xl p-4 shadow-md border-4 border-primary/40 ring-4 ring-primary/20 overflow-hidden transition-all hover:scale-[1.02]">
<div class="absolute inset-0 bg-primary/5 opacity-50"></div>
<div class="relative h-full w-full flex flex-col items-center justify-center gap-2">
<img alt="Cartoon Elephant" class="h-3/4 object-contain mb-2" data-alt="Friendly cartoon elephant illustration with big ears" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDsrQu1tKU3WpoQYzymB3YT0hijbtjNqu7t-ndg00Prqqojnq_3TW1Y9heyw-_i7NG_9rES4zrWVltIxgJ9Zu5p44qGZ3X7Tod1XkNlwk2UcBUb-zSfF3DQ2fkGIZZWC650HdAQC7W4AlHZiMd8IUx3a2u_a0aaMTiLPwxTert2kB6qUAJc_nhnJP3j85Tp4WLqdrKaTz-XohynqP4YyBm4fW7i1dIeEC7pyct52bBKNqp7csmzhF_KCXXEn2igQjvUAeKky4P7v0E"/>
<span class="text-lg font-bold text-slate-700 dark:text-slate-300">Elephant</span>
</div>
<!-- Correct Glow Effect -->
<div class="absolute top-2 right-2">
<span class="material-symbols-outlined text-primary fill-1">check_circle</span>
</div>
</button>
<!-- Option 2: Lion -->
<button class="group aspect-square bg-white dark:bg-slate-800 rounded-3xl p-4 shadow-sm border-2 border-transparent hover:border-primary/20 transition-all hover:scale-[1.02]">
<div class="h-full w-full flex flex-col items-center justify-center gap-2">
<img alt="Cartoon Lion" class="h-3/4 object-contain mb-2" data-alt="Cute friendly lion with a soft orange mane" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDS-D0d8hYcVeA72JRPiYyFo48Cnzd_CvJUjV_xhaWRHr5dXJyv2cEvisaFkCbvjQ6iDPLydoduNSYc3liVZ-OX6VSwCG7reOzcv_gT6f1bpSkatD9sCSSxH77Ww3FgBPOhflfKYtV0fFrfPZYtsKNr4DULm9IzFocL5tMFcUivgbIhSvzJhbkJJUpnkvk8m7bYNBcBrWr8gCn5JXq7l1E2zKuCuVSndNjotKjwO8TXlFuwyUVZ6we2RfAu4CEmVtPxvi2VPB41BAk"/>
<span class="text-lg font-bold text-slate-700 dark:text-slate-300">Lion</span>
</div>
</button>
<!-- Option 3: Cat -->
<button class="group aspect-square bg-white dark:bg-slate-800 rounded-3xl p-4 shadow-sm border-2 border-transparent hover:border-primary/20 transition-all hover:scale-[1.02]">
<div class="h-full w-full flex flex-col items-center justify-center gap-2">
<img alt="Cartoon Cat" class="h-3/4 object-contain mb-2" data-alt="Small cute white kitten cartoon illustration" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBj2TbGCwslP6WZ3TTEEIbIkkDNgGa3xOtPMAEnatFwPwYg4MkwT94-DLNl2Zs6R5qzTLMXYBzbVM_X0selBS5Rgj0CssKCLz7anmJt1rY1O2uLUFppTBZ7qk6g2-s7s9mL790VbYG8QRQqRAEzImgKcaKLIXay38LlPjUw3bkCWAj3ICMEwc3TiFfXCBQjFV0mLmxe9VLG_siBxrYQEYFQhMydzmJ5ZFURFbgHONzXC98Z8nc3diask_Cwtk1Hak8Svu9Kz1nBxG8"/>
<span class="text-lg font-bold text-slate-700 dark:text-slate-300">Cat</span>
</div>
</button>
<!-- Option 4: Dog -->
<button class="group aspect-square bg-white dark:bg-slate-800 rounded-3xl p-4 shadow-sm border-2 border-transparent hover:border-primary/20 transition-all hover:scale-[1.02]">
<div class="h-full w-full flex flex-col items-center justify-center gap-2">
<img alt="Cartoon Dog" class="h-3/4 object-contain mb-2" data-alt="Happy puppy with brown spots cartoon drawing" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBzNfRiMBKPJDwbWWqCKI4Kmtim9M0eOBxAG0s-WyjL2ZHRCjrbwgrg8PHzp_iVXXWvpK9xkAaGF399i0plp1ckqxhx7URN0rRwNcGewe19PfMZrJ4RCu4eYnIZYtwENkG0ffNgoHLJx-JMZq6MhPPeqIAAoA9M7-pWBdFUW71LYvxTxJ7yIcbusr_pRrQEoMK0suLyLyBNfFXcKj7u37oBv1A0AMCEQrR090YLvIkwyZmFuVqHCvxM9R6Pov2vjvvKhlN3BjgFwHI"/>
<span class="text-lg font-bold text-slate-700 dark:text-slate-300">Dog</span>
</div>
</button>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="bg-white dark:bg-background-dark border-t border-primary/10 px-6 py-3 pb-8">
<div class="flex justify-between items-center max-w-2xl mx-auto">
<button class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500">
<span class="material-symbols-outlined text-2xl">home</span>
<span class="text-[10px] font-bold uppercase">Home</span>
</button>
<button class="flex flex-col items-center gap-1 text-primary">
<span class="material-symbols-outlined text-2xl fill-1">school</span>
<span class="text-[10px] font-bold uppercase">Learn</span>
<div class="h-1.5 w-1.5 bg-primary rounded-full mt-0.5"></div>
</button>
<button class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500">
<span class="material-symbols-outlined text-2xl">record_voice_over</span>
<span class="text-[10px] font-bold uppercase">Speak</span>
</button>
<button class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500">
<span class="material-symbols-outlined text-2xl">auto_stories</span>
<span class="text-[10px] font-bold uppercase">Stories</span>
</button>
<button class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500">
<span class="material-symbols-outlined text-2xl">person</span>
<span class="text-[10px] font-bold uppercase">Profile</span>
</button>
</div>
</nav>
</div>
<!-- Success Feedback (Hidden by default, can be simulated) -->
<div class="fixed inset-0 pointer-events-none z-[100] flex items-center justify-center opacity-0 transition-opacity duration-300">
<div class="bg-white/90 dark:bg-slate-800/90 p-10 rounded-full shadow-2xl flex flex-col items-center gap-4">
<div class="relative">
<span class="material-symbols-outlined text-6xl text-yellow-400 fill-1">star</span>
<span class="material-symbols-outlined absolute -top-4 -right-4 text-4xl text-yellow-300 animate-pulse">colors_spark</span>
</div>
<p class="text-2xl font-black text-primary">Wonderful listening!</p>
</div>
</div>
</body></html>
