<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#ee5b2b",
              "background-light": "#f8f6f6",
              "background-dark": "#221510",
            },
            fontFamily: {
              "display": ["Be Vietnam Pro", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .floating-shape {
            position: absolute;
            z-index: 0;
            opacity: 0.1;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen relative overflow-x-hidden">
<!-- Decorative background elements -->
<div class="fixed inset-0 pointer-events-none overflow-hidden">
<div class="floating-shape top-10 left-10 text-primary">
<span class="material-symbols-outlined text-[80px]">star</span>
</div>
<div class="floating-shape top-1/4 right-[-20px] text-primary/40">
<span class="material-symbols-outlined text-[120px]">circle</span>
</div>
<div class="floating-shape bottom-1/4 left-[-30px] text-primary/30">
<span class="material-symbols-outlined text-[100px]">change_history</span>
</div>
<div class="floating-shape bottom-10 right-10 text-primary/20">
<span class="material-symbols-outlined text-[60px]">favorite</span>
</div>
</div>
<div class="relative flex flex-col min-h-screen w-full max-w-[480px] mx-auto bg-white/80 dark:bg-background-dark/80 backdrop-blur-sm shadow-2xl">
<!-- Top Navigation Area -->
<header class="flex items-center justify-between px-6 py-4">
<div class="flex items-center gap-2">
<div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center text-white">
<span class="material-symbols-outlined text-xl">auto_stories</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold tracking-tight">RAMA AAI</h2>
</div>
<div class="w-10 h-10 rounded-full border-2 border-primary/20 p-0.5">
<div class="w-full h-full rounded-full bg-cover bg-center" data-alt="User profile avatar smiling" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuAsJu0NOkWnLK503de6vbCvRlMTWFOcAlj6sdNbTfXrZVFCWuhVkrCqSyTSckkDNX0UEKPNBd6vNU2E73zo2nXv8ZzEy2qTC6QbX_t5zBdNvcfQkDdFwjmvzUBakE3OClFDTNn86GAPA8-OjvTpse0Qn-UQMcPX-rJonlMivyfpVw0HJRosKqkKaLD6wo-SV9XzfTO8U8zCzWkcldXEKJlGosTIaFQqE-QUIJz3nEyc2OHz1tbYH4mhCTsV0SmclPv6e30fQ2GcpqA")'></div>
</div>
</header>
<!-- Main Content -->
<main class="flex-1 flex flex-col items-center px-6 py-4 space-y-6 z-10">
<!-- Instruction Text -->
<h1 class="text-slate-900 dark:text-slate-100 text-3xl font-bold text-center leading-tight pt-4">
                Repeat after <span class="text-primary">Rama Aai</span>
</h1>
<!-- Rama Aai Feedback Section -->
<div class="flex items-center gap-4 w-full bg-primary/10 dark:bg-primary/5 rounded-xl p-4 border border-primary/10">
<div class="w-16 h-16 shrink-0 rounded-full overflow-hidden bg-primary/20 border-2 border-primary">
<img class="w-full h-full object-cover" data-alt="Friendly Indian grandmother character Rama Aai smiling" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDrqlycnr2brCxJdHDgRpgGW3f6dsFNNYyaSN-oIIc037jdodqhI_Ajx8-MWJ6UH0Uauhfsg5OnKbMIBkfsfYr_TWvGLcAZecvjvg4IjAvHIoMJRezkz0pRByBX285JFH8XCiWM9H3KyeAkPNABYW1hU23CB-HQfeOH2HeNYyAiAy3_O_9ai69_yon4HuJetAmPWiYTcqRll-mj1E6_6QhADKrs3-MHJ6FX7eCUhzDLAtP9vYikATAluYRQ5HAUPUDTcreFB5AKUrk"/>
</div>
<div class="relative bg-white dark:bg-slate-800 px-4 py-2 rounded-2xl rounded-tl-none shadow-sm">
<p class="text-slate-900 dark:text-slate-100 font-medium">"Great pronunciation!"</p>
<div class="absolute -left-2 top-0 w-0 h-0 border-t-[8px] border-t-white dark:border-t-slate-800 border-l-[8px] border-l-transparent"></div>
</div>
</div>
<!-- Vocabulary Card -->
<div class="w-full bg-white dark:bg-slate-800 rounded-xl shadow-xl overflow-hidden border border-slate-100 dark:border-slate-700">
<div class="aspect-square w-full bg-gradient-to-br from-orange-50 to-orange-100 dark:from-slate-700 dark:to-slate-800 flex items-center justify-center p-8">
<img class="max-w-full max-h-full rounded-lg object-contain" data-alt="A friendly colorful cartoon elephant illustration" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDJ-ftQMrAN-rI06xrQ3wGvNh3jbDEZYLUxrv6ZJH-mECQZweZTb0r3va2j1Z_E1YAbuSCGF0VJ2lqCQJhb5GLRKUSEaFnC2Vd2b1NTwAgx_dMN-76UDvieSculYVT2PyCqSSzcs2ivs5dZE6O_HhuUeKCYbpxDNqXTTuJPniO9NMeGVRfFJ99O8Uh2yrY0uD53kXoUMWXL4vI71pSgD8zqyq4hG6n4ln0aeHc3THDqYiHI1QUbcj_3XIxeAyb6ieYhXeGww1oUBGc"/>
</div>
<div class="p-6 text-center border-t border-slate-50 dark:border-slate-700">
<h2 class="text-4xl font-bold text-slate-900 dark:text-slate-100 tracking-tight">Elephant</h2>
<p class="text-primary font-medium mt-1">/ˈɛlɪfənt/</p>
</div>
</div>
<!-- Audio Visualization -->
<div class="w-full h-16 flex items-center justify-center gap-1.5 px-8">
<div class="w-1.5 h-4 bg-primary rounded-full"></div>
<div class="w-1.5 h-8 bg-primary rounded-full"></div>
<div class="w-1.5 h-12 bg-primary rounded-full"></div>
<div class="w-1.5 h-6 bg-primary rounded-full"></div>
<div class="w-1.5 h-10 bg-primary rounded-full"></div>
<div class="w-1.5 h-14 bg-primary rounded-full"></div>
<div class="w-1.5 h-8 bg-primary rounded-full"></div>
<div class="w-1.5 h-12 bg-primary rounded-full"></div>
<div class="w-1.5 h-4 bg-primary rounded-full"></div>
</div>
<!-- Control Buttons -->
<div class="w-full grid grid-cols-1 gap-4 pt-2 pb-8">
<div class="flex gap-3">
<button class="flex-1 bg-primary text-white h-16 rounded-xl font-bold text-lg flex items-center justify-center gap-2 shadow-lg shadow-primary/30 active:scale-95 transition-transform">
<span class="material-symbols-outlined">volume_up</span>
                        Listen
                    </button>
<button class="flex-1 bg-slate-100 dark:bg-slate-700 text-slate-900 dark:text-slate-100 h-16 rounded-xl font-bold text-lg flex items-center justify-center gap-2 active:scale-95 transition-transform">
<span class="material-symbols-outlined">refresh</span>
                        Try Again
                    </button>
</div>
<button class="w-full bg-slate-900 dark:bg-white dark:text-slate-900 text-white h-20 rounded-xl font-bold text-xl flex items-center justify-center gap-3 shadow-xl active:scale-95 transition-transform border-4 border-primary/20">
<span class="material-symbols-outlined text-3xl">mic</span>
                    Tap to Speak
                </button>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="sticky bottom-0 w-full bg-white dark:bg-background-dark border-t border-slate-100 dark:border-slate-800 px-6 py-3 flex justify-between items-center z-20">
<div class="flex flex-col items-center gap-1 text-slate-400">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px] font-bold">Home</span>
</div>
<div class="flex flex-col items-center gap-1 text-slate-400">
<span class="material-symbols-outlined">menu_book</span>
<span class="text-[10px] font-bold">Learn</span>
</div>
<div class="flex flex-col items-center gap-1 text-primary">
<div class="bg-primary/10 p-1.5 rounded-lg">
<span class="material-symbols-outlined !fill-1">mic</span>
</div>
<span class="text-[10px] font-bold">Speak</span>
</div>
<div class="flex flex-col items-center gap-1 text-slate-400">
<span class="material-symbols-outlined">auto_stories</span>
<span class="text-[10px] font-bold">Stories</span>
</div>
<div class="flex flex-col items-center gap-1 text-slate-400">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] font-bold">Profile</span>
</div>
</nav>
</div>
</body></html>
