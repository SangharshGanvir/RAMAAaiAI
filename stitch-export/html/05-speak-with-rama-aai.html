<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ee5b2b",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221510",
                    },
                    fontFamily: {
                        "display": ["Be Vietnam Pro"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .neumorphic-flat {
            background: #f8f6f6;
            box-shadow: 8px 8px 16px #e2e0e0, -8px -8px 16px #ffffff;
        }
        .neumorphic-inset {
            background: #f8f6f6;
            box-shadow: inset 6px 6px 12px #e2e0e0, inset -6px -6px 12px #ffffff;
        }
        .neumorphic-button {
            background: #ee5b2b;
            box-shadow: 6px 6px 12px #d1cfcf, -6px -6px 12px #ffffff;
        }
        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 20px;
            border-width: 10px 10px 0;
            border-style: solid;
            border-color: #ffffff transparent;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen overflow-x-hidden">
<div class="relative min-h-screen w-full flex flex-col bg-gradient-to-b from-[#fff5f2] to-[#fef9f3] overflow-hidden">
<div class="absolute inset-0 pointer-events-none opacity-40">
<span class="material-symbols-outlined absolute top-20 left-10 text-primary/30 text-4xl">star</span>
<span class="material-symbols-outlined absolute top-40 right-12 text-primary/20 text-3xl">auto_awesome</span>
<span class="material-symbols-outlined absolute bottom-1/3 left-1/4 text-primary/20 text-2xl">circle</span>
<span class="material-symbols-outlined absolute top-1/4 right-1/3 text-primary/10 text-5xl">cloud</span>
<span class="material-symbols-outlined absolute bottom-40 right-20 text-primary/30 text-4xl">star</span>
</div>
<div class="layout-container flex h-full grow flex-col z-10">
<header class="flex items-center justify-between px-6 py-6 lg:px-40">
<button class="flex items-center justify-center rounded-full size-12 neumorphic-flat text-slate-900 transition-transform active:scale-95">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-xl lg:text-2xl font-bold tracking-tight text-slate-800">Speak with Rama Aai</h1>
<div class="size-12"></div>
</header>
<main class="flex-1 flex flex-col items-center justify-center px-6 gap-10">
<div class="relative">
<div class="neumorphic-flat p-4 rounded-full border-4 border-white">
<div class="size-48 lg:size-64 rounded-full bg-cover bg-center overflow-hidden" data-alt="Illustration of a friendly Indian grandmother smiling warmly" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCyVatIhzVSVt9ElMSeeME9fsTsn1V3sCQsmN6iC2Rp03qVdm6Ze-qjqA1WRMGyEoVoPyZsQpP00q567rWboHr9jZgsZj2ZcaYLHuFRS7SxPRB62o7kTqTFVk9O73yHCLRDeIFVN59FxUZV7HULUe5P6Y9gUPfOsChgsyYqqHtZy39CnyqMxdTGjMpSWZJfWO7-Ylh__Sg41pUYrQj7kfnBhtu1FlH6ndCrsl9QYSw463V6wMkEfshXl4oZz7dsP7dpE7tMSM1YsJw');">
</div>
</div>
<div class="absolute -bottom-2 right-4 bg-green-500 size-6 rounded-full border-4 border-white"></div>
</div>
<div class="max-w-md w-full relative">
<div class="bg-white p-6 rounded-xl shadow-sm border border-primary/5 speech-bubble relative">
<p class="text-lg lg:text-xl font-medium text-slate-700 leading-relaxed">
                            Hello my dear child! Shall we tell a story today?
                        </p>
</div>
<p class="mt-4 text-center text-primary font-bold animate-pulse">Rama Aai is listening...</p>
</div>
<div class="w-full max-w-sm px-4">
<div class="flex items-center justify-center gap-1.5 h-16">
<div class="w-1.5 h-6 bg-primary/40 rounded-full"></div>
<div class="w-1.5 h-10 bg-primary/60 rounded-full"></div>
<div class="w-1.5 h-14 bg-primary/80 rounded-full"></div>
<div class="w-1.5 h-16 bg-primary rounded-full"></div>
<div class="w-1.5 h-12 bg-primary/80 rounded-full"></div>
<div class="w-1.5 h-14 bg-primary rounded-full"></div>
<div class="w-1.5 h-8 bg-primary/60 rounded-full"></div>
<div class="w-1.5 h-10 bg-primary/40 rounded-full"></div>
<div class="w-1.5 h-4 bg-primary/30 rounded-full"></div>
</div>
</div>
</main>
<footer class="flex flex-col items-center pb-12 pt-4">
<div class="flex flex-col items-center gap-4">
<button class="neumorphic-button size-24 lg:size-28 rounded-full flex items-center justify-center text-white transition-all hover:scale-105 active:scale-90">
<span class="material-symbols-outlined text-4xl lg:text-5xl" style="font-variation-settings: 'FILL' 1">mic</span>
</button>
<p class="text-slate-500 font-bold text-sm tracking-widest uppercase">Tap to speak</p>
</div>
</footer>
</div>
</div>
</body></html>
