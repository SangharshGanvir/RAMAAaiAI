<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700&amp;family=Noto+Sans:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ee5b2b",
                        "background-light": "#fdf8f6",
                        "background-dark": "#221510",
                    },
                    fontFamily: {
                        "display": ["Be Vietnam Pro", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .floating-shape {
            position: absolute;
            z-index: 0;
            opacity: 0.6;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen relative overflow-x-hidden">
<!-- Decorative Floating Shapes -->
<div class="floating-shape top-10 left-10 text-primary/20">
<span class="material-symbols-outlined text-6xl">cloud</span>
</div>
<div class="floating-shape top-40 right-10 text-yellow-400/30">
<span class="material-symbols-outlined text-4xl">star</span>
</div>
<div class="floating-shape bottom-40 left-5 text-primary/20">
<span class="material-symbols-outlined text-5xl">flutter_dash</span>
</div>
<div class="floating-shape top-1/2 right-5 text-blue-400/20">
<span class="material-symbols-outlined text-4xl">cloud</span>
</div>
<div class="relative flex min-h-screen w-full flex-col z-10">
<!-- Header -->
<header class="flex items-center justify-between px-6 py-6 max-w-2xl mx-auto w-full">
<button class="flex items-center justify-center rounded-full h-12 w-12 bg-white dark:bg-slate-800 shadow-sm border border-primary/10 text-slate-900 dark:text-slate-100">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-slate-900 dark:text-slate-100 text-2xl font-bold tracking-tight">Ask Rama Aai</h1>
<div class="w-12"></div> <!-- Spacer for centering -->
</header>
<!-- Main Content Container -->
<main class="flex-1 flex flex-col items-center px-6 max-w-2xl mx-auto w-full pb-32">
<!-- Rama Aai Profile Section -->
<div class="mt-4 flex flex-col items-center gap-6">
<div class="relative p-2 rounded-full bg-gradient-to-tr from-primary to-yellow-400 shadow-xl">
<div class="bg-white dark:bg-slate-800 rounded-full p-1">
<div class="aspect-square w-48 h-48 rounded-full overflow-hidden bg-center bg-cover border-4 border-white dark:border-slate-700" data-alt="Friendly illustration of an elderly Indian woman smiling kindly" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAFFEYlKiWr0s0r3P-OVpo_m2Vp4QXKQ_snGkUPG3yFRaBDK1VmM1eDY9MCLTPph2u7sKsVsEJOThnSt9GjflYS_TqxZE2QEfvweaWY1svBbuaqG_49kxbKWWotz3m_goE5q5tMYEAErPxQtHsvpUveQEHaldmU0U33j-_RTjnhnYc5LM7z7FvVcGdWQxvmJjLVvrTMREDT5IfX5zZwwD9K6d2CshyTs6VkDkNDBKJaR0ZXcJw-90MMs88qBtOCEfU3gvEUau-ysCo');">
</div>
</div>
</div>
<!-- Speech Bubble -->
<div class="relative bg-white dark:bg-slate-800 px-8 py-4 rounded-3xl shadow-lg border-2 border-primary/10 mb-4">
<div class="absolute -top-3 left-1/2 -translate-x-1/2 w-0 h-0 border-l-[12px] border-l-transparent border-r-[12px] border-r-transparent border-bottom-[12px] border-b-white dark:border-b-slate-800 rotate-180 transform translate-y-full mt-4"></div>
<p class="text-slate-900 dark:text-slate-100 text-xl font-bold text-center">You can ask me anything!</p>
</div>
</div>
<!-- Suggestions Grid -->
<div class="w-full mt-8 grid grid-cols-2 gap-4">
<button class="group flex flex-col items-center gap-3 p-4 bg-white dark:bg-slate-800 rounded-xl shadow-md border-b-4 border-primary/20 hover:border-primary transition-all">
<div class="h-16 w-16 bg-orange-100 dark:bg-orange-900/30 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-3xl">pets</span>
</div>
<p class="text-slate-900 dark:text-slate-100 font-bold text-center text-sm">What is a tiger?</p>
</button>
<button class="group flex flex-col items-center gap-3 p-4 bg-white dark:bg-slate-800 rounded-xl shadow-md border-b-4 border-primary/20 hover:border-primary transition-all">
<div class="h-16 w-16 bg-purple-100 dark:bg-purple-900/30 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-purple-600 dark:text-purple-400 text-3xl">auto_stories</span>
</div>
<p class="text-slate-900 dark:text-slate-100 font-bold text-center text-sm">Tell me a story.</p>
</button>
<button class="group flex flex-col items-center gap-3 p-4 bg-white dark:bg-slate-800 rounded-xl shadow-md border-b-4 border-primary/20 hover:border-primary transition-all">
<div class="h-16 w-16 bg-blue-100 dark:bg-blue-900/30 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-blue-600 dark:text-blue-400 text-3xl">spellcheck</span>
</div>
<p class="text-slate-900 dark:text-slate-100 font-bold text-center text-sm">How do you spell cat?</p>
</button>
<button class="group flex flex-col items-center gap-3 p-4 bg-white dark:bg-slate-800 rounded-xl shadow-md border-b-4 border-primary/20 hover:border-primary transition-all">
<div class="h-16 w-16 bg-yellow-100 dark:bg-yellow-900/30 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-yellow-600 dark:text-yellow-400 text-3xl">light_mode</span>
</div>
<p class="text-slate-900 dark:text-slate-100 font-bold text-center text-sm">What color is the sun?</p>
</button>
</div>
</main>
<!-- Fixed Footer with Microphone -->
<footer class="fixed bottom-0 left-0 right-0 p-8 flex justify-center bg-gradient-to-t from-background-light dark:from-background-dark via-background-light/90 dark:via-background-dark/90 to-transparent">
<div class="relative">
<!-- Pulse Effect Visual Representation -->
<div class="absolute inset-0 scale-150 bg-primary/20 rounded-full"></div>
<div class="absolute inset-0 scale-125 bg-primary/30 rounded-full"></div>
<button class="relative h-24 w-24 bg-primary text-white rounded-full flex items-center justify-center shadow-2xl hover:scale-105 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-5xl font-bold" style="font-variation-settings: 'FILL' 1">mic</span>
</button>
</div>
</footer>
</div>
</body></html>
