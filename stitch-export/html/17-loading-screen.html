<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700&amp;family=Noto+Sans:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ee5b2b",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221510",
                    },
                    fontFamily: {
                        "display": ["Be Vietnam Pro", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .pastel-gradient {
            background: linear-gradient(135deg, #fff5f2 0%, #fffbf0 50%, #f0f9ff 100%);
        }
        .floating-element {
            /* Basic positioning for clouds and stars */
            position: absolute;
            pointer-events: none;
        }
    </style>
</head>
<body class="font-display bg-background-light dark:bg-background-dark overflow-hidden">
<div class="relative flex h-screen w-full flex-col items-center justify-center pastel-gradient dark:from-[#2d1b15] dark:to-[#1a0f0b]">
<!-- Background Decor (Clouds & Stars) -->
<div class="absolute inset-0 overflow-hidden">
<span class="material-symbols-outlined floating-element text-primary/10 text-6xl top-10 left-10">cloud</span>
<span class="material-symbols-outlined floating-element text-primary/10 text-8xl top-1/4 right-20">cloud</span>
<span class="material-symbols-outlined floating-element text-primary/20 text-4xl bottom-20 left-1/4">cloud</span>
<span class="material-symbols-outlined floating-element text-yellow-400/40 text-2xl top-20 right-1/3">star</span>
<span class="material-symbols-outlined floating-element text-yellow-400/30 text-3xl bottom-1/3 left-10">star</span>
<span class="material-symbols-outlined floating-element text-yellow-400/50 text-xl top-1/2 right-10">star</span>
<span class="material-symbols-outlined floating-element text-yellow-400/20 text-4xl top-1/4 left-1/2">star</span>
</div>
<!-- Main Content Container -->
<div class="relative z-10 flex flex-col items-center max-w-[600px] w-full px-6 text-center">
<!-- Hero Character Illustration Wrapper -->
<div class="w-72 h-72 md:w-96 md:h-96 mb-8 relative">
<div class="absolute inset-0 bg-primary/5 rounded-full blur-3xl"></div>
<div class="w-full h-full bg-center bg-no-repeat bg-contain flex items-center justify-center" data-alt="Friendly grandmother character sitting and reading a colorful storybook" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuD7zMTPncD9IKRuxuqQ1CHtN-8MsBvCM1vPKRWBnLLfgLmVyQH7Z_PAFoABkxkLIOmZM1Vw1BuZkB9qG7ILmFIhWxol0XF_UHPJRrskGdK8eGB7DqnMhG70uvRgRlRVmAvGmFwYU6mrnvAskN0biRee9pwTEu1yrTU5EF874GEHQQFGxm1P1atNgBG2LintiMJW5bYrIRLu2sP1SOPT1KO5vXIlJJI4TXLxpC8jIv0sBV5_BENyWLPAcqxmxDncJKJmSC9w5bOtDIM");'>
</div>
</div>
<!-- Typography Section -->
<div class="space-y-4">
<h1 class="text-slate-900 dark:text-slate-100 text-3xl md:text-4xl font-bold tracking-tight leading-tight">
                Rama Aai is preparing your <span class="text-primary">next adventure.</span>
</h1>
<p class="text-slate-600 dark:text-slate-400 text-lg font-medium">
                Gathering magical stories just for you...
            </p>
</div>
<!-- Loading Progress -->
<div class="w-full max-w-sm mt-12 px-4">
<div class="flex justify-between items-center mb-3">
<span class="text-primary font-bold flex items-center gap-2">
<span class="material-symbols-outlined text-xl">auto_fix_high</span>
                    Loading magic...
                </span>
<span class="text-slate-500 dark:text-slate-400 font-bold">65%</span>
</div>
<div class="h-4 w-full bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden p-1 shadow-inner">
<div class="h-full bg-primary rounded-full transition-all duration-500" style="width: 65%;"></div>
</div>
</div>
<!-- Secondary Visual Cards -->
<div class="grid grid-cols-3 gap-4 mt-16 w-full opacity-60">
<div class="flex flex-col items-center gap-2">
<div class="w-full aspect-square bg-primary/10 rounded-xl border-2 border-dashed border-primary/20 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-3xl">menu_book</span>
</div>
</div>
<div class="flex flex-col items-center gap-2">
<div class="w-full aspect-square bg-primary/10 rounded-xl border-2 border-dashed border-primary/20 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-3xl">palette</span>
</div>
</div>
<div class="flex flex-col items-center gap-2">
<div class="w-full aspect-square bg-primary/10 rounded-xl border-2 border-dashed border-primary/20 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-3xl">music_note</span>
</div>
</div>
</div>
</div>
<!-- Footer Branding (Subtle) -->
<div class="absolute bottom-8 left-0 right-0 text-center">
<p class="text-slate-400 dark:text-slate-500 text-sm font-medium flex items-center justify-center gap-1">
<span class="material-symbols-outlined text-base">favorite</span>
            RAMA AAI – My Loving Learning Companion
        </p>
</div>
</div>
</body></html>
