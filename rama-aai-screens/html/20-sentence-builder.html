<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Rama Aai - Sentence Builder</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ee5b2b",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221510",
                    },
                    fontFamily: {
                        "display": ["Be Vietnam Pro"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .pastel-mesh {
            background-color: #f8f6f6;
            background-image: 
                radial-gradient(at 0% 0%, rgba(238, 91, 43, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(255, 224, 212, 0.4) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(238, 91, 43, 0.05) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(255, 235, 230, 0.3) 0px, transparent 50%);
        }
        .dotted-placeholder {
            border: 2px dashed #ee5b2b40;
        }
    </style>
</head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen selection:bg-primary/30">
<div class="relative flex h-auto min-h-screen w-full flex-col group/design-root overflow-x-hidden pastel-mesh">
<div class="layout-container flex h-full grow flex-col">
<!-- Top Nav Bar -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-primary/10 px-6 py-4 bg-white/50 backdrop-blur-md sticky top-0 z-50">
<div class="flex items-center gap-3 text-slate-900">
<div class="flex items-center justify-center size-10 rounded-xl bg-primary text-white">
<span class="material-symbols-outlined">auto_stories</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight">RAMA AAI</h2>
</div>
<div class="flex items-center gap-4">
<div class="flex items-center gap-2 bg-primary/10 px-3 py-1.5 rounded-full border border-primary/20">
<span class="material-symbols-outlined text-primary text-lg">stars</span>
<span class="text-primary font-bold text-sm">124</span>
</div>
<button class="flex items-center justify-center rounded-xl size-10 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300">
<span class="material-symbols-outlined">settings</span>
</button>
</div>
</header>
<!-- Main Content Container -->
<main class="flex-1 flex flex-col items-center max-w-[960px] mx-auto w-full px-4 py-8">
<!-- Floating Elements Decor -->
<div class="absolute top-20 left-10 text-primary/20 pointer-events-none">
<span class="material-symbols-outlined text-4xl">flutter_dash</span>
</div>
<div class="absolute top-40 right-10 text-primary/20 pointer-events-none">
<span class="material-symbols-outlined text-3xl">star_rate</span>
</div>
<!-- Rama Aai Interaction Area -->
<div class="flex flex-col items-center mb-10 w-full animate-fade-in">
<div class="flex gap-6 items-end">
<div class="relative group">
<div class="absolute -inset-1 bg-gradient-to-tr from-primary to-orange-300 rounded-full blur opacity-25 group-hover:opacity-50 transition"></div>
<div class="relative bg-white p-1 rounded-full border-2 border-primary/20 shadow-lg">
<img alt="Rama Aai" class="size-32 rounded-full object-cover" data-alt="Friendly Indian grandmother character with a warm smile" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDv_AKAaYVLg-zVVOvdTwSJbfEG5eP1t5CkpQFmh3F2JIM0PWeA258_kM4HDjcdcwn0wrXmXQfW2wPizh-Lt6S2NcJ5MZkj4pNnH4RLLGvvFxMCjsUy249HcqrhY2O2UkJzkow3ov9HCgZAPi7eBH1SgG5MO_ijP3cLKUczzlB6g1m1a60WvoqUWKI2bmgyrNk-nRIHQgaT4piQMbyAVS6iC7-Aestb6QTflBWfoWevIVwRkyNedibHvbJYYyq9xA0lu_a243F4yfw"/>
</div>
</div>
<div class="relative bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-xl border border-primary/10 max-w-sm mb-4">
<!-- Speech Bubble Triangle -->
<div class="absolute bottom-4 -left-3 w-4 h-4 bg-white dark:bg-slate-800 border-l border-b border-primary/10 transform rotate-45"></div>
<p class="text-xl font-bold text-primary mb-1">Great sentence!</p>
<p class="text-slate-600 dark:text-slate-300">Arrange the words to make a sentence about what you love!</p>
<div class="mt-2 flex gap-1">
<span class="material-symbols-outlined text-yellow-400 text-lg fill-1">star</span>
<span class="material-symbols-outlined text-yellow-400 text-lg fill-1">star</span>
<span class="material-symbols-outlined text-yellow-400 text-lg fill-1">star</span>
</div>
</div>
</div>
</div>
<!-- Success State Effects (Confetti Layout Placeholder) -->
<div class="absolute inset-0 pointer-events-none overflow-hidden">
<div class="absolute top-1/4 left-1/4 animate-bounce"><span class="material-symbols-outlined text-primary/40">celebration</span></div>
<div class="absolute top-1/3 right-1/4 animate-bounce delay-75"><span class="material-symbols-outlined text-orange-400/40">auto_awesome</span></div>
</div>
<!-- Instruction Section -->
<div class="text-center mb-12">
<h3 class="text-2xl font-bold text-slate-800 dark:text-slate-100 mb-2">Arrange the words</h3>
<div class="h-1.5 w-24 bg-primary/20 rounded-full mx-auto">
<div class="h-full w-2/3 bg-primary rounded-full"></div>
</div>
</div>
<!-- Sentence Placeholders (Target Zone) -->
<div class="flex flex-wrap justify-center gap-4 mb-20 w-full min-h-[100px] items-center">
<div class="w-32 h-20 rounded-2xl dotted-placeholder flex items-center justify-center bg-white/30 backdrop-blur-sm">
<span class="text-primary/30 text-4xl">1</span>
</div>
<div class="w-48 h-20 rounded-2xl dotted-placeholder flex items-center justify-center bg-white/30 backdrop-blur-sm">
<span class="text-primary/30 text-4xl">2</span>
</div>
<div class="w-40 h-20 rounded-2xl dotted-placeholder flex items-center justify-center bg-white/30 backdrop-blur-sm">
<span class="text-primary/30 text-4xl">3</span>
</div>
</div>
<!-- Word Cards (Draggable Style) -->
<div class="flex flex-wrap justify-center gap-6 w-full">
<!-- Word 1 -->
<div class="group cursor-grab active:scale-95 transition-all">
<div class="bg-white dark:bg-slate-800 px-10 py-6 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.08)] border border-slate-100 dark:border-slate-700 hover:shadow-primary/20 hover:border-primary/30 transform hover:-translate-y-1 transition duration-200">
<span class="text-3xl font-bold text-slate-800 dark:text-slate-100">like</span>
</div>
</div>
<!-- Word 2 -->
<div class="group cursor-grab active:scale-95 transition-all">
<div class="bg-white dark:bg-slate-800 px-10 py-6 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.08)] border border-slate-100 dark:border-slate-700 hover:shadow-primary/20 hover:border-primary/30 transform hover:-translate-y-1 transition duration-200">
<span class="text-3xl font-bold text-slate-800 dark:text-slate-100">apples</span>
</div>
</div>
<!-- Word 3 -->
<div class="group cursor-grab active:scale-95 transition-all">
<div class="bg-white dark:bg-slate-800 px-10 py-6 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.08)] border border-slate-100 dark:border-slate-700 hover:shadow-primary/20 hover:border-primary/30 transform hover:-translate-y-1 transition duration-200">
<span class="text-3xl font-bold text-slate-800 dark:text-slate-100">I</span>
</div>
</div>
</div>
<!-- Action Bar -->
<div class="mt-16 w-full flex justify-center gap-4">
<button class="px-8 py-4 bg-primary/10 text-primary font-bold rounded-xl hover:bg-primary/20 transition-colors flex items-center gap-2">
<span class="material-symbols-outlined">refresh</span>
                        Reset
                    </button>
<button class="px-12 py-4 bg-primary text-white font-bold rounded-xl shadow-lg shadow-primary/30 hover:shadow-xl hover:scale-105 transition-all flex items-center gap-2">
                        Check Sentence
                        <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</main>
<!-- Bottom Navigation Bar -->
<footer class="bg-white dark:bg-slate-900 border-t border-primary/10 px-6 py-2 pb-8 sticky bottom-0 z-50">
<div class="max-w-[600px] mx-auto flex justify-between items-center">
<a class="flex flex-col items-center gap-1 group" href="#">
<div class="p-2 rounded-xl group-hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-slate-400 group-hover:text-primary">home</span>
</div>
<span class="text-[10px] font-bold text-slate-400 group-hover:text-primary uppercase tracking-wider">Home</span>
</a>
<a class="flex flex-col items-center gap-1 group" href="#">
<div class="p-2 rounded-xl bg-primary text-white shadow-md shadow-primary/30">
<span class="material-symbols-outlined fill-1">school</span>
</div>
<span class="text-[10px] font-bold text-primary uppercase tracking-wider">Learn</span>
</a>
<a class="flex flex-col items-center gap-1 group" href="#">
<div class="p-2 rounded-xl group-hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-slate-400 group-hover:text-primary">mic</span>
</div>
<span class="text-[10px] font-bold text-slate-400 group-hover:text-primary uppercase tracking-wider">Speak</span>
</a>
<a class="flex flex-col items-center gap-1 group" href="#">
<div class="p-2 rounded-xl group-hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-slate-400 group-hover:text-primary">menu_book</span>
</div>
<span class="text-[10px] font-bold text-slate-400 group-hover:text-primary uppercase tracking-wider">Stories</span>
</a>
<a class="flex flex-col items-center gap-1 group" href="#">
<div class="p-2 rounded-xl group-hover:bg-primary/10 transition-colors">
<div class="size-6 rounded-full overflow-hidden border border-slate-300">
<img alt="Profile" class="size-full object-cover" data-alt="Small avatar of a happy child student" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCxlqXvc1G3CHIPkMeQrTm_duwhRWnvg0lvVTh_cdOLT54Hk1DAkSKlLcE8p6rK31jylSmtGHhVgTU0rt9bxFbsBfKaJh5EfdztSECwAhuyCUEnAQYNCsYU4DqJLA8cR53ATZ43JJlCAyBshGWjRQQtuN2Mu4xT55qiYR67asGA4k3pVxaAjvG4t37lbeHGCyIphGvn8pU9MVip5cnGQRoFRspVuu_0HqQ-6TVfR04FxmEltq3wcgpA5gHzbUJPRdf_seX2Y02yYQA"/>
</div>
</div>
<span class="text-[10px] font-bold text-slate-400 group-hover:text-primary uppercase tracking-wider">Profile</span>
</a>
</div>
</footer>
</div>
</div>
</body></html>
